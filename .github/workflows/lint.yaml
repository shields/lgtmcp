name: Lint

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        run: make lint

      # Static analysis of these workflow files, mirroring local `zizmor --pedantic .`.
      # advanced-security: false keeps this a plain pass/fail gate (no SARIF upload to the
      # Security tab), so the job needs no security-events: write. online-audits: false
      # reproduces the offline local run deterministically.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6fc4b006235f201fdab3722e17240ab420d580e5 # v0.6.1
        with:
          persona: pedantic
          advanced-security: false
          online-audits: false
          annotations: true
